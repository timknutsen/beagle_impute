# ============================================================
# beagle_impute configuration
# ============================================================
# Edit this file or override individual values on the command line:
#   snakemake --config bfile=/path/to/mydata plink_path=/path/to/plink2

# --- Input ---
bfile: "tests/data/test_salmon"         # Prefix of PLINK .bed/.bim/.fam files
reference_vcf: ""                        # (Optional) phased reference VCF for harmonization;
                                         # leave empty to skip bcftools_isec + conform-gt steps

# --- Output ---
output_dir: "vcf_output"

# --- Tool paths ---
plink_path: "plink2"                     # plink2 is installed via envs/workflow_env.yaml; override if needed
beagle_jar: "bin/beagle.jar"            # Auto-downloaded on first run; override with an existing JAR path
conform_gt_jar: "bin/conform-gt.jar"    # Auto-downloaded on first run (only used if reference_vcf is set)
bref3_jar: ""                            # (Optional) Path to bref3.jar for faster reference loading.
                                         # Convert VCF ref panel to bref3 once; Beagle reads it 3-43x faster.
                                         # Get bref3.jar from the same page as the Beagle JAR.

# --- Extra PLINK flags ---
# `--dog` is ALWAYS prepended automatically by the Snakefile so plink2 accepts
# non-human chromosome codes (1–38). This covers salmon (29), trout (32), and
# every livestock species we run. Use this field only for additional, dataset-
# specific flags (e.g. "--maf 0.01"). Leave empty in the common case.
plink_extra_flags: ""

# --- Imputer selection ---
# Choose the imputation engine: "beagle" (default) or "alphaimpute2"
#   beagle        — population LD-based; requires beagle_jar; good when no pedigree
#   alphaimpute2  — pedigree + population; good for structured livestock/aquaculture
imputer: "beagle"

# --- Beagle parameters ---
beagle_params:
  window: 80        # Window size in cM (default Beagle 5.5 is 40; 80 gives more LD context)
  overlap: 20       # Overlap between windows in cM (~25% of window is recommended)
  ne: 500           # Effective population size. Set to match your study species:
                    #   ~500        salmon, small livestock populations
                    #   ~1000       cattle, dogs
                    #   ~1,000,000  large outbred human populations (Beagle default)
  nthreads: 4       # Threads for Beagle. Match to cluster/local CPU allocation.

# --- AlphaImpute2 parameters (used when imputer: "alphaimpute2") ---
# AlphaImpute2 is installed automatically via pip in envs/alphaimpute2_env.yaml.
# It requires no external JAR — just set imputer above and adjust the options below.
alphaimpute2_params:
  maxthreads: 1                   # AlphaImpute2 0.0.3 segfaulted with >1 thread on RT24 chr5
  cycles: 4                       # Peeling rounds for pedigree imputation
  final_peeling_threshold: 0.1    # Genotype calling confidence (0.1 = best-guess, 0.9+ = high-confidence only)
  hd_threshold: 0.95              # Proportion non-missing markers to classify an individual as high-density
  length: 1.0                     # Chromosome map length in Morgans (1.0 = 100 cM; adjust per species)
  ped_only: false                 # true = skip population imputation, use pedigree only
  pop_only: false                 # true = skip pedigree imputation, use population only
  phase_output: false             # true = also write a .haplotypes phasing output file
